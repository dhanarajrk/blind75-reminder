name: Run Reminder Job

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  trigger-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Call reminder endpoint
        run: |
          curl -X POST "https://blind75-reminder-backend.onrender.com/api/reminders/run" \
          -H "Authorization: Bearer ${{ secrets.REMINDER_CRON_SECRET }}"